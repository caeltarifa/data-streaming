name: Trigger auto deployment for frontend-github-app

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/frontend-github-app-AutoDeployTrigger-96888eb0-91b7-4416-b107-3a0120eaf1b6.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.FRONTENDGITHUBAPP_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.FRONTENDGITHUBAPP_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.FRONTENDGITHUBAPP_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          registryUrl: 
          registryUsername: ${{ secrets.FRONTENDGITHUBAPP_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.FRONTENDGITHUBAPP_REGISTRY_PASSWORD }}
          containerAppName: frontend-github-app
          resourceGroup: frontend-RG
          imageToBuild: default/[parameters('containerAppName')]:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


